################
### MONITORS ###
################
monitor=eDP-1,preferred,auto,1

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$terminal-warp = warp-terminal
$fileManager = nautilus
# $menu = wofi --show drun
$menu = rofi -show drun -show-icons
$runner = rofi -show run
# $window = rofi -show window
$browser = brave-origin-nightly 

#################
### AUTOSTART ###
#################

exec-once = waybar & hyprpaper & swaync & hypridle & pypr
exec-once = wl-paste --watch cliphist store &
exec-once = nm-applet --indicator
exec-once = gsettings set org.gnome.desktop.interface color-scheme prefer-dark
exec-once = gsettings set org.gnome.desktop.interface gtk-theme Adwaita-dark
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = gnome-keyring-daemon --start --components=secrets

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_STYLE_OVERRIDE,kvantum

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 1
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
        # Note: shadow:ignore_window removed in 0.55 (now always enabled)
    }

    blur {
        enabled = false
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = false
}

dwindle {
    preserve_split = true
    # Note: pseudotile removed in 0.55 — it was non-functional
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = false
    }
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER
$secondMod = SUPER + ALT

# Launch programs
bind = $mainMod, I, exec, $terminal
bind = $mainMod, Q, exec, $terminal-warp
bind = $mainMod, E, exec, $fileManager
# bind = $mainMod, W, exec, $window
bind = $mainMod, B, exec, $browser
bind = $mainMod, space, exec, $menu
bind = $secondMod, space, exec, $runner
# layoutmod dispatcher renamed to layoutmsg in recent Hyprland versions
bind = $mainMod, P, layoutmsg, pseudotile   # toggle pseudotile
bind = $mainMod, J, layoutmsg, split        # split dwindle layout
bind = ,PRINT, exec, hyprshot -m window
bind = Shift,PRINT, exec, hyprshot -m region
bind = $mainMod, O, exec, wlogout
bind = $mainMod, R, exec, ~/dotfiles/waybar/scripts/reload.sh
bind = $mainMod, T, exec, ~/dotfiles/waybar/scripts/launch.sh
bind = $mainMod, A, exec, pypr toggle term
bind = $mainMod, Y, exec, sh -c 'cliphist list | wofi --dmenu | cliphist decode | wl-copy'
bind = $mainMod, C, killactive,
bind = $mainMod SHIFT, C, forcekillactive,
bind = SUPER, M, exec, hyprctl dispatch exit
# Move focus
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, d

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through workspaces with mouse
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Resize active window with arrow keys
bind = $mainMod, left, resizeactive, -10 0
bind = $mainMod, right, resizeactive, 10 0
bind = $mainMod, up, resizeactive, 0 -20
bind = $mainMod, down, resizeactive, 0 20

# Media keys
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
