# Alacritty Configuration
# Theme: Tokyo Night | Font: JetBrainsMono Nerd Font | Size: 20
# WSL Profile

[general]
import = []

# ── Shell (WSL) ────────────────────────────────────────────────────────────────
[terminal.shell]
program = "wsl.exe"
args = ["~"]

# ── Window ─────────────────────────────────────────────────────────────────────
[window]
padding = { x = 12, y = 10 }
decorations = "full"
opacity = 0.96
blur = true
startup_mode = "Maximized"
title = "Alacritty — WSL"
dynamic_title = true

# ── Scrolling ──────────────────────────────────────────────────────────────────
[scrolling]
history = 10000
multiplier = 3

# ── Font ───────────────────────────────────────────────────────────────────────
[font]
size = 16.0

[font.normal]
family = "JetBrainsMono Nerd Font Mono"
style  = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font Mono"
style  = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font Mono"
style  = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font Mono"
style  = "Bold Italic"

# ── Tokyo Night Colors ─────────────────────────────────────────────────────────
[colors]

[colors.primary]
background = "#1a1b26"   # Tokyo Night bg
foreground = "#c0caf5"   # Tokyo Night fg

[colors.cursor]
text   = "#1a1b26"
cursor = "#c0caf5"

[colors.vi_mode_cursor]
text   = "#1a1b26"
cursor = "#bb9af7"

[colors.search.matches]
foreground = "#1a1b26"
background = "#ff9e64"

[colors.search.focused_match]
foreground = "#1a1b26"
background = "#73daca"

[colors.hints.start]
foreground = "#1a1b26"
background = "#e0af68"

[colors.hints.end]
foreground = "#1a1b26"
background = "#7aa2f7"

[colors.selection]
text       = "#c0caf5"
background = "#283457"

[colors.normal]
black   = "#15161e"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#a9b1d6"

[colors.bright]
black   = "#414868"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#c0caf5"

[colors.dim]
black   = "#0d0e14"
red     = "#914c54"
green   = "#4a6741"
yellow  = "#836947"
blue    = "#404f7e"
magenta = "#6b4c7e"
cyan    = "#4a7275"
white   = "#5a5f79"

# ── Cursor ─────────────────────────────────────────────────────────────────────
[cursor]
style        = { shape = "Block", blinking = "On" }
blink_interval = 500
unfocused_hollow = true

# ── Mouse ──────────────────────────────────────────────────────────────────────
[mouse]
hide_when_typing = true

# ── Keyboard Bindings ──────────────────────────────────────────────────────────
[[keyboard.bindings]]
key   = "V"
mods  = "Control|Shift"
action = "Paste"

[[keyboard.bindings]]
key   = "C"
mods  = "Control|Shift"
action = "Copy"

[[keyboard.bindings]]
key   = "Plus"
mods  = "Control"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key   = "Minus"
mods  = "Control"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key   = "Key0"
mods  = "Control"
action = "ResetFontSize"

[[keyboard.bindings]]
key   = "F11"
action = "ToggleFullscreen"
